// restaurant-service/src/proto/restaurant.proto
syntax = "proto3";

package restaurant;

service RestaurantService {
  // ── CRUD RESTAURANTES ──────────────────────────────────────
  rpc CreateRestaurant (CreateRestaurantRequest) returns (RestaurantResponse) {}
  rpc GetRestaurants   (Empty)                   returns (RestaurantListResponse) {}
  rpc GetRestaurant    (GetRestaurantRequest)     returns (RestaurantResponse) {}
  rpc UpdateRestaurant (UpdateRestaurantRequest)  returns (RestaurantResponse) {}
  rpc DeleteRestaurant (DeleteRestaurantRequest)  returns (DeleteResponse) {}

  // ── CRUD MENÚ ──────────────────────────────────────────────
  rpc CreateMenuItem (CreateMenuItemRequest)  returns (MenuItemResponse) {}
  rpc GetMenu        (GetMenuRequest)         returns (MenuListResponse) {}
  rpc UpdateMenuItem (UpdateMenuItemRequest)  returns (MenuItemResponse) {}
  rpc DeleteMenuItem (DeleteMenuItemRequest)  returns (DeleteResponse) {}

  // ── GESTIÓN DE ÓRDENES (NUEVO) ─────────────────────────────
  rpc GetIncomingOrders (GetIncomingOrdersRequest) returns (RestaurantOrderListResponse) {}
  rpc AcceptOrder       (AcceptOrderRequest)        returns (OrderActionResponse) {}
  rpc RejectOrder       (RejectOrderRequest)        returns (OrderActionResponse) {}
}

// ── MENSAJES COMUNES ───────────────────────────────────────────
message Empty {}

message DeleteResponse {
  bool   success = 1;
  string message = 2;
}

// ── MENSAJES RESTAURANTE ───────────────────────────────────────
message CreateRestaurantRequest {
  string name       = 1;
  string address    = 2;
  string category   = 3;
  string horario    = 4;
  string calificacion = 5;
}

message GetRestaurantRequest {
  int32 id = 1;
}

message UpdateRestaurantRequest {
  int32  id       = 1;
  string name     = 2;
  string address  = 3;
  string category = 4;
  string horario  = 5;
}

message DeleteRestaurantRequest {
  int32 id = 1;
}

message RestaurantResponse {
  int32  id          = 1;
  string name        = 2;
  string address     = 3;
  string category    = 4;
  string horario     = 5;
  string calificacion = 6;
}

message RestaurantListResponse {
  repeated RestaurantResponse restaurants = 1;
}

// ── MENSAJES MENÚ ──────────────────────────────────────────────
message CreateMenuItemRequest {
  int32  restaurantId = 1;
  string name         = 2;
  string description  = 3;
  float  price        = 4;
}

message GetMenuRequest {
  int32 restaurantId = 1;
}

message UpdateMenuItemRequest {
  int32  id          = 1;
  string name        = 2;
  string description = 3;
  float  price       = 4;
}

message DeleteMenuItemRequest {
  int32 id = 1;
}

message MenuItemResponse {
  int32  id           = 1;
  string name         = 2;
  string description  = 3;
  float  price        = 4;
  int32  restaurantId = 5;
}

message MenuListResponse {
  repeated MenuItemResponse items = 1;
}

// ── MENSAJES ÓRDENES ENTRANTES (NUEVO) ────────────────────────
message GetIncomingOrdersRequest {
  int32 restaurantId = 1;
}

message OrderItemSnapshot {
  int32 menuItemId = 1;
  int32 quantity   = 2;
  float price      = 3;
}

message RestaurantOrderResponse {
  int32  id             = 1;
  int32  orderId        = 2;   // ID en el order-service
  int32  restaurantId   = 3;
  int32  userId         = 4;
  float  total          = 5;
  string status         = 6;   // PENDING | ACCEPTED | REJECTED
  string rejectionReason = 7;
  string createdAt      = 8;
  repeated OrderItemSnapshot items = 9;
}

message RestaurantOrderListResponse {
  repeated RestaurantOrderResponse orders = 1;
}

message AcceptOrderRequest {
  int32 orderId      = 1;
  int32 restaurantId = 2;
}

message RejectOrderRequest {
  int32  orderId      = 1;
  int32  restaurantId = 2;
  string reason       = 3;   // Razón opcional del rechazo
}

message OrderActionResponse {
  bool   success  = 1;
  string message  = 2;
  int32  orderId  = 3;
  string status   = 4;
  string reason   = 5;   // Solo en rechazo
}
