// order-service/src/proto/order.proto
syntax = "proto3";

package order;

service OrderService {
  rpc CreateOrder           (CreateOrderRequest)         returns (OrderResponse) {}
  rpc GetOrder              (GetOrderRequest)            returns (OrderResponse) {}
  rpc GetOrdersByUser       (GetOrdersByUserRequest)     returns (OrdersListResponse) {}
  rpc UpdateOrderStatus     (UpdateStatusRequest)        returns (OrderResponse) {}
  rpc UploadDeliveryPhoto   (UploadPhotoRequest)         returns (OrderResponse) {}
  rpc UpdatePaymentStatus   (UpdatePaymentStatusRequest) returns (OrderResponse) {}
  rpc GetOrdersByRestaurant (GetByRestaurantRequest)     returns (OrdersListResponse) {}
  rpc GetFinishedOrders     (EmptyRequest)               returns (OrdersListResponse) {}
  rpc GetOrdersByStatus     (GetOrdersByStatusRequest)   returns (OrdersListResponse) {}
  rpc CreateRating           (CreateRatingRequest)    returns (RatingResponse) {}
rpc GetRatingsByRestaurant (GetByRestaurantRequest) returns (RatingsListResponse) {}
rpc GetRatingByOrder       (GetOrderRequest)        returns (RatingResponse) {}
}

message OrderItemRequest {
  int32 menuItemId = 1;
  int32 quantity   = 2;
  float price      = 3;
}

message CreateOrderRequest {
  int32 userId       = 1;
  int32 restaurantId = 2;
  repeated OrderItemRequest items = 3;
}

message GetOrderRequest        { int32 id = 1; }
message GetOrdersByUserRequest { int32 userId = 1; }
message GetByRestaurantRequest { int32 restaurantId = 1; }
message EmptyRequest           {}
message GetOrdersByStatusRequest { string status = 1; }

message UpdateStatusRequest {
  int32  id                   = 1;
  string status               = 2;
  string deliveryFailedReason = 3;
}

message UploadPhotoRequest {
  int32  orderId     = 1;
  string photoBase64 = 2;
}

message UpdatePaymentStatusRequest {
  int32  orderId       = 1;
  string paymentStatus = 2;
}

message OrderItemResponse {
  int32 menuItemId = 1;
  int32 quantity   = 2;
  float price      = 3;
}

message OrderResponse {
  int32  id                   = 1;
  int32  userId               = 2;
  int32  restaurantId         = 3;
  float  total                = 4;
  string status               = 5;
  string paymentStatus        = 6;
  string deliveryPhoto        = 7;
  string deliveryFailedReason = 8;
  string createdAt            = 9;
  repeated OrderItemResponse items = 10;
}

message OrdersListResponse {
  repeated OrderResponse orders = 1;
}

message CreateRatingRequest {
  int32 orderId = 1; int32 userId = 2; int32 restaurantId = 3;
  int32 repartidorId = 4; int32 ratingRestaurant = 5;
  int32 ratingDelivery = 6; int32 ratingProduct = 7; string comment = 8;
}
message RatingResponse {
  int32 id = 1; int32 orderId = 2; int32 restaurantId = 3;
  int32 ratingRestaurant = 4; int32 ratingDelivery = 5;
  int32 ratingProduct = 6; string comment = 7; string createdAt = 8;
}
message RatingsListResponse {
  repeated RatingResponse ratings = 1; double avg = 2;
}
